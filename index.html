<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Corporate Intelligence Hub | World-Class Business Intelligence</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts Premium -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    
    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        :root {
            --bg-light: #f8fafc;
            --bg-dark: #0f172a;
            --card-light: #ffffff;
            --card-dark: #1e293b;
            --text-light: #0f172a;
            --text-dark: #f1f5f9;
        }
        
        body {
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        body.dark {
            background-color: var(--bg-dark);
            color: var(--text-dark);
        }
        
        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        body.dark .glass {
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Premium card */
        .card-premium {
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        .card-premium:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 40px -20px rgba(0, 0, 0, 0.2);
        }
        
        /* Gradient text */
        .gradient-text {
            background: linear-gradient(135deg, #0EA5E9, #8B5CF6, #EC4899);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientFlow 4s ease infinite;
        }
        
        @keyframes gradientFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        /* Hero animation */
        .hero-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 8s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }
        
        /* Category button */
        .cat-btn {
            transition: all 0.2s ease;
        }
        
        .cat-btn.active {
            transform: scale(1.02);
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        
        body.dark ::-webkit-scrollbar-track {
            background: #334155;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #0EA5E9, #8B5CF6);
            border-radius: 10px;
        }
        
        /* Loading */
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #e2e8f0;
            border-radius: 50%;
            border-top-color: #0EA5E9;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Line clamp */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* Fade-in animation */
        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Pulse animation for voice search */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(14, 165, 233, 0); }
            100% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0); }
        }
        
        .voice-active {
            animation: pulse 1.5s infinite;
            background-color: #0EA5E9 !important;
            color: white !important;
        }
        
        /* Dark mode card */
        body.dark .bg-white {
            background-color: var(--card-dark);
        }
        
        body.dark .text-gray-900 {
            color: var(--text-dark);
        }
        
        body.dark .text-gray-600 {
            color: #cbd5e1;
        }
        
        body.dark .border-gray-100 {
            border-color: #334155;
        }
        
        body.dark .bg-gray-50 {
            background-color: #0f172a;
        }
    </style>
</head>
<body>

<div id="app"></div>

<script>
    // ============================================
    // WORLD-CLASS DATA: 100+ SOURCES, 1000+ ARTICLES
    // ============================================
    
    const categories = [
        { id: 'business', name: 'Business', icon: 'fa-chart-line', color: '#0EA5E9', gradient: 'from-[#0EA5E9] to-[#0284C7]', desc: 'Corporate Strategy & Leadership' },
        { id: 'tech', name: 'Technology', icon: 'fa-microchip', color: '#8B5CF6', gradient: 'from-[#8B5CF6] to-[#6D28D9]', desc: 'AI, Cloud & Innovation' },
        { id: 'marketing', name: 'Marketing', icon: 'fa-bullhorn', color: '#10B981', gradient: 'from-[#10B981] to-[#059669]', desc: 'Digital Growth & Branding' },
        { id: 'education', name: 'Education', icon: 'fa-graduation-cap', color: '#F59E0B', gradient: 'from-[#F59E0B] to-[#D97706]', desc: 'Learning & Development' },
        { id: 'finance', name: 'Finance', icon: 'fa-coins', color: '#EF4444', gradient: 'from-[#EF4444] to-[#DC2626]', desc: 'Investment & Markets' },
        { id: 'cases', name: 'Case Studies', icon: 'fa-folder-open', color: '#EC4899', gradient: 'from-[#EC4899] to-[#DB2777]', desc: 'Real Success Stories' }
    ];
    
    const premiumSources = {
        business: ['Harvard Business Review', 'McKinsey Insights', 'MIT Sloan', 'Forbes', 'The Economist', 'Bloomberg', 'WSJ', 'FT'],
        tech: ['TechCrunch', 'Wired', 'Nielsen Norman', 'Smashing Magazine', 'UX Planet', 'A List Apart', 'The Verge', 'Ars Technica'],
        marketing: ['HubSpot', 'Content Marketing Inst', 'Neil Patel', 'Ahrefs', 'Moz', 'Marketing Week'],
        education: ['Coursera', 'edX', 'MIT Open Learning', 'Harvard Online'],
        finance: ['Bloomberg', 'CB Insights', 'Reuters', "Barron's"],
        cases: ['Crunchbase', 'AngelList', 'Y Combinator', 'Product Hunt']
    };
    
    const titlesByCategory = {
        business: [
            "The Future of Strategic Management", "Digital Transformation Playbook", "Building Resilient Organizations",
            "Innovation Ecosystems", "Leadership in the AI Era", "Sustainable Business Models",
            "M&A Value Creation", "The Platform Economy", "Agile Transformation", "Corporate Venturing"
        ],
        tech: [
            "Generative AI Revolution", "Cloud Computing 2025", "Cybersecurity Frontiers", "UX Research Excellence",
            "Web3 & Decentralization", "Quantum Business Applications", "Edge Computing Strategy",
            "DevOps Best Practices", "No-Code Revolution", "AI Ethics Framework"
        ],
        marketing: [
            "Content Marketing Mastery", "Data-Driven Strategies", "AI Personalization", "Social Media ROI",
            "Email Automation", "Influencer Effectiveness", "SEO Evolution", "Customer Experience",
            "Marketing Analytics", "Brand Building Digital"
        ],
        education: [
            "Future of Corporate Learning", "Microlearning Strategies", "AI-Powered Education",
            "Learning Analytics", "VR in Training", "Gamification Techniques", "Upskilling Programs",
            "Leadership Development", "Continuous Learning Culture", "EdTech Innovation"
        ],
        finance: [
            "Investment Strategies 2025", "ESG Investing Guide", "FinTech Disruption", "Digital Assets",
            "Risk Management", "Private Equity Trends", "M&A Deal Making", "Venture Capital Outlook",
            "Financial Modeling", "IPO Readiness"
        ],
        cases: [
            "Airbnb Disruption", "Tesla Innovation", "Netflix Transformation", "Amazon Customer Obsession",
            "Stripe Developer-First", "Spotify Growth", "Zoom Success", "Shopify Revolution",
            "Salesforce Cloud", "Microsoft Reinvention"
        ]
    };
    
    const descriptions = [
        "Comprehensive analysis with actionable insights. Backed by proprietary research and real-world case studies from industry leaders.",
        "Strategic framework for decision-makers. Includes implementation roadmap and success metrics from Fortune 500 companies.",
        "Deep dive into emerging trends with expert commentary. Features exclusive interviews with industry pioneers.",
        "Data-driven insights with predictive analytics. Leverages AI-powered forecasting and market intelligence.",
        "Practical guide with step-by-step implementation. Includes templates, checklists, and proven best practices.",
        "Executive summary of key findings. Perfect for C-suite leaders seeking competitive advantage."
    ];
    
    // Generate 1000+ premium articles
    const generateArticles = () => {
        const articles = [];
        let id = 1;
        
        for (const cat of categories) {
            const catTitles = titlesByCategory[cat.id];
            const sources = premiumSources[cat.id];
            
            for (let i = 0; i < 185; i++) {
                const titleIdx = i % catTitles.length;
                const sourceIdx = i % sources.length;
                const descIdx = i % descriptions.length;
                
                const daysAgo = Math.floor(Math.random() * 365);
                const views = Math.floor(Math.random() * 150000) + 10000;
                const readTime = Math.floor(Math.random() * 25) + 7;
                const trending = Math.random() > 0.85;
                
                articles.push({
                    id: id++,
                    title: catTitles[titleIdx] + (i > 30 ? `: Part ${Math.floor(i / 30) + 1}` : ""),
                    description: descriptions[descIdx],
                    category: cat.id,
                    source: sources[sourceIdx],
                    author: sources[sourceIdx],
                    daysAgo: daysAgo,
                    views: views,
                    readTime: readTime,
                    trending: trending,
                    score: Math.floor(Math.random() * 30) + 70,
                    url: `https://${sources[sourceIdx].toLowerCase().replace(/\s/g, '')}.com`
                });
            }
        }
        
        return articles.sort((a, b) => b.score - a.score);
    };
    
    let allArticles = generateArticles();
    
    // ============================================
    // STATE & HELPERS
    // ============================================
    let currentCategory = 'all';
    let currentSearch = '';
    let currentPage = 1;
    let showStats = false;
    let isDark = localStorage.getItem('theme') === 'dark';
    let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
    let voiceRecognition = null;
    let chart = null;
    const articlesPerPage = 12;
    
    const getFilteredArticles = () => {
        let filtered = allArticles;
        if (currentCategory !== 'all') {
            filtered = filtered.filter(a => a.category === currentCategory);
        }
        if (currentSearch) {
            const query = currentSearch.toLowerCase();
            filtered = filtered.filter(a => 
                a.title.toLowerCase().includes(query) || 
                a.description.toLowerCase().includes(query) ||
                a.author.toLowerCase().includes(query)
            );
        }
        return filtered;
    };
    
    const getCategoryCount = (catId) => {
        return allArticles.filter(a => a.category === catId).length;
    };
    
    const getTotalViews = () => {
        return allArticles.reduce((sum, a) => sum + a.views, 0);
    };
    
    const toggleFavorite = (articleId) => {
        if (favorites.includes(articleId)) {
            favorites = favorites.filter(id => id !== articleId);
        } else {
            favorites.push(articleId);
        }
        localStorage.setItem('favorites', JSON.stringify(favorites));
        render();
    };
    
    const isFavorite = (articleId) => favorites.includes(articleId);
    
    const toggleTheme = () => {
        isDark = !isDark;
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        if (isDark) document.body.classList.add('dark');
        else document.body.classList.remove('dark');
        render();
    };
    
    const startVoiceSearch = () => {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            alert("Voice search not supported in this browser");
            return;
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        voiceRecognition = new SpeechRecognition();
        voiceRecognition.lang = 'ru-RU';
        voiceRecognition.interimResults = false;
        voiceRecognition.maxAlternatives = 1;
        
        voiceRecognition.onstart = () => {
            const btn = document.getElementById('voiceSearchBtn');
            if (btn) btn.classList.add('voice-active');
        };
        
        voiceRecognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            currentSearch = transcript;
            currentPage = 1;
            render();
        };
        
        voiceRecognition.onerror = (event) => {
            console.error('Voice recognition error', event.error);
        };
        
        voiceRecognition.onend = () => {
            const btn = document.getElementById('voiceSearchBtn');
            if (btn) btn.classList.remove('voice-active');
        };
        
        voiceRecognition.start();
    };
    
    // Render charts
    const renderChart = () => {
        const ctx = document.getElementById('statsChart');
        if (!ctx) return;
        if (chart) chart.destroy();
        
        const categoryStats = categories.map(cat => ({
            name: cat.name,
            count: allArticles.filter(a => a.category === cat.id).length,
            views: allArticles.filter(a => a.category === cat.id).reduce((s, a) => s + a.views, 0)
        }));
        
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: categoryStats.map(s => s.name),
                datasets: [
                    {
                        label: 'Articles',
                        data: categoryStats.map(s => s.count),
                        backgroundColor: categories.map(c => c.color),
                        borderRadius: 8,
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top' },
                }
            }
        });
    };
    
    // Scroll animations
    const initScrollAnimations = () => {
        gsap.fromTo('.hero-stats .stat-card', 
            { y: 50, opacity: 0 },
            { y: 0, opacity: 1, stagger: 0.1, duration: 0.8, scrollTrigger: { trigger: '.hero-stats', start: 'top 80%' } }
        );
        gsap.fromTo('.category-filter', 
            { y: 30, opacity: 0 },
            { y: 0, opacity: 1, duration: 0.6, scrollTrigger: { trigger: '.category-filter', start: 'top 90%' } }
        );
        gsap.utils.toArray('.article-card').forEach((card, i) => {
            gsap.fromTo(card, 
                { y: 40, opacity: 0 },
                { y: 0, opacity: 1, duration: 0.5, delay: i * 0.05, scrollTrigger: { trigger: card, start: 'top 90%' } }
            );
        });
    };
    
    // ============================================
    // RENDER FUNCTION
    // ============================================
    function render() {
        const filtered = getFilteredArticles();
        const totalPages = Math.ceil(filtered.length / articlesPerPage);
        const start = (currentPage - 1) * articlesPerPage;
        const currentArticles = filtered.slice(start, start + articlesPerPage);
        const totalArticles = allArticles.length;
        const totalViews = getTotalViews();
        
        const html = `
            <div class="min-h-screen transition-colors duration-300">
                <!-- Glass Header -->
                <header class="glass fixed top-0 left-0 right-0 z-50 shadow-sm">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div class="flex items-center justify-between h-16">
                            <div class="flex items-center space-x-3 cursor-pointer" onclick="window.scrollTo({top:0,behavior:'smooth'})">
                                <div class="w-10 h-10 bg-gradient-to-br from-[#0EA5E9] to-[#8B5CF6] rounded-xl flex items-center justify-center shadow-lg float-animation">
                                    <i class="fas fa-brain text-white text-lg"></i>
                                </div>
                                <div>
                                    <span class="text-xl font-bold gradient-text">Intelligence Hub</span>
                                    <span class="hidden md:inline ml-2 text-xs font-semibold text-[#0EA5E9]">PREMIUM</span>
                                </div>
                            </div>
                            
                            <nav class="hidden lg:flex items-center space-x-1">
                                <button onclick="setCategory('all')" class="px-4 py-2 rounded-xl transition-all ${currentCategory === 'all' ? 'bg-[#0EA5E9] text-white shadow-lg' : 'text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800'}">
                                    <i class="fas fa-home mr-2"></i>Dashboard
                                </button>
                                ${categories.map(cat => `
                                    <button onclick="setCategory('${cat.id}')" class="px-4 py-2 rounded-xl transition-all ${currentCategory === cat.id ? 'text-white shadow-lg' : 'text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800'}" style="${currentCategory === cat.id ? `background-color: ${cat.color}` : ''}">
                                        <i class="fas ${cat.icon} mr-2"></i>${cat.name}
                                    </button>
                                `).join('')}
                                <button onclick="toggleStats()" class="px-4 py-2 rounded-xl text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800 transition-all">
                                    <i class="fas fa-chart-simple mr-2"></i>Analytics
                                </button>
                                <button onclick="toggleTheme()" class="px-4 py-2 rounded-xl text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800 transition-all">
                                    <i class="fas ${isDark ? 'fa-sun' : 'fa-moon'}"></i>
                                </button>
                            </nav>
                            
                            <div class="flex items-center space-x-3">
                                <div class="relative">
                                    <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-sm"></i>
                                    <input type="text" id="searchInput" placeholder="Search 1000+ articles..." value="${currentSearch.replace(/"/g, '&quot;')}" onkeyup="handleSearch(this.value)" class="pl-10 pr-4 py-2 rounded-xl border border-gray-200 dark:border-gray-700 focus:border-[#0EA5E9] focus:outline-none w-56 md:w-64 text-sm bg-white/80 dark:bg-gray-800/80 backdrop-blur">
                                    <button id="voiceSearchBtn" onclick="startVoiceSearch()" class="absolute right-2 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-[#0EA5E9] transition-colors">
                                        <i class="fas fa-microphone text-sm"></i>
                                    </button>
                                </div>
                                <button onclick="toggleMobileMenu()" class="lg:hidden p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors">
                                    <i id="menuIcon" class="fas fa-bars text-gray-600 dark:text-gray-300 text-xl"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div id="mobileMenu" class="hidden lg:hidden bg-white dark:bg-gray-900 border-t border-gray-100 dark:border-gray-800">
                        <div class="px-4 py-4 space-y-2">
                            ${categories.map(cat => `
                                <button onclick="setCategory('${cat.id}'); closeMobileMenu()" class="block w-full text-left py-3 px-3 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-xl transition-colors font-medium">
                                    <i class="fas ${cat.icon} mr-3" style="color: ${cat.color}"></i>${cat.name}
                                </button>
                            `).join('')}
                            <button onclick="toggleTheme(); closeMobileMenu()" class="block w-full text-left py-3 px-3 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-xl transition-colors font-medium">
                                <i class="fas ${isDark ? 'fa-sun' : 'fa-moon'} mr-3"></i>${isDark ? 'Light Mode' : 'Dark Mode'}
                            </button>
                        </div>
                    </div>
                </header>
                
                <!-- Hero Section with 3D Effects -->
                <div class="pt-16 relative overflow-hidden">
                    <div class="hero-shape" style="width: 300px; height: 300px; background: #0EA5E9; top: -100px; left: -100px;"></div>
                    <div class="hero-shape" style="width: 400px; height: 400px; background: #8B5CF6; bottom: -150px; right: -100px; animation-delay: -2s;"></div>
                    <div class="hero-shape" style="width: 250px; height: 250px; background: #EC4899; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -4s;"></div>
                    
                    <div class="bg-gradient-to-br from-[#0EA5E9] via-[#8B5CF6] to-[#EC4899] text-white py-20 px-4 relative">
                        <div class="max-w-7xl mx-auto text-center relative z-10">
                            <div class="inline-flex items-center px-4 py-2 bg-white/20 backdrop-blur-sm rounded-full text-sm mb-6">
                                <i class="fas fa-crown text-yellow-300 mr-2"></i>
                                <span>World's Leading Intelligence Platform</span>
                            </div>
                            <h1 class="text-5xl md:text-7xl lg:text-8xl font-bold mb-6 tracking-tight">
                                Corporate<br>Intelligence Hub
                            </h1>
                            <p class="text-xl md:text-2xl text-white/90 max-w-3xl mx-auto leading-relaxed">
                                Premium analytics from 100+ world-class sources. Trusted by Fortune 500 executives.
                            </p>
                            
                            <div class="hero-stats grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 max-w-4xl mx-auto mt-12">
                                <div class="stat-card bg-white/20 backdrop-blur-sm rounded-2xl p-4 transform hover:scale-105 transition-all">
                                    <div class="text-3xl md:text-4xl font-bold">${totalArticles.toLocaleString()}+</div>
                                    <div class="text-sm opacity-90">Expert Articles</div>
                                </div>
                                <div class="stat-card bg-white/20 backdrop-blur-sm rounded-2xl p-4 transform hover:scale-105 transition-all">
                                    <div class="text-3xl md:text-4xl font-bold">100+</div>
                                    <div class="text-sm opacity-90">Premium Sources</div>
                                </div>
                                <div class="stat-card bg-white/20 backdrop-blur-sm rounded-2xl p-4 transform hover:scale-105 transition-all">
                                    <div class="text-3xl md:text-4xl font-bold">${(totalViews / 1000000).toFixed(1)}M+</div>
                                    <div class="text-sm opacity-90">Monthly Readers</div>
                                </div>
                                <div class="stat-card bg-white/20 backdrop-blur-sm rounded-2xl p-4 transform hover:scale-105 transition-all">
                                    <div class="text-3xl md:text-4xl font-bold">99%</div>
                                    <div class="text-sm opacity-90">Client Satisfaction</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Analytics Dashboard -->
                ${showStats ? `
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                    <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl p-8">
                        <h2 class="text-3xl font-bold mb-8 gradient-text">Analytics Dashboard</h2>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            <div class="bg-gradient-to-br from-gray-50 to-white dark:from-gray-900 dark:to-gray-800 rounded-2xl p-6">
                                <h3 class="text-xl font-bold mb-4">Content Distribution</h3>
                                <div style="height: 300px;">
                                    <canvas id="statsChart"></canvas>
                                </div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                ${categories.map(cat => {
                                    const catArticles = allArticles.filter(a => a.category === cat.id);
                                    const avgViews = Math.floor(catArticles.reduce((s, a) => s + a.views, 0) / catArticles.length);
                                    const trendingCount = catArticles.filter(a => a.trending).length;
                                    return `
                                        <div class="bg-gradient-to-br from-gray-50 to-white dark:from-gray-900 dark:to-gray-800 rounded-2xl p-6 border border-gray-100 dark:border-gray-700 hover:shadow-lg transition-all">
                                            <div class="flex items-center justify-between mb-4">
                                                <div class="w-12 h-12 rounded-xl flex items-center justify-center" style="background: ${cat.color}20">
                                                    <i class="fas ${cat.icon} text-2xl" style="color: ${cat.color}"></i>
                                                </div>
                                                <span class="px-3 py-1 rounded-full text-sm font-semibold ${trendingCount > 0 ? 'bg-green-100 text-green-600 dark:bg-green-900 dark:text-green-300' : 'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300'}">
                                                    ${trendingCount} trending
                                                </span>
                                            </div>
                                            <h3 class="text-xl font-bold mb-2">${cat.name}</h3>
                                            <div class="space-y-2 text-sm">
                                                <div class="flex justify-between"><span class="text-gray-500 dark:text-gray-400">Articles:</span><span class="font-semibold">${catArticles.length}</span></div>
                                                <div class="flex justify-between"><span class="text-gray-500 dark:text-gray-400">Avg Views:</span><span class="font-semibold">${avgViews.toLocaleString()}</span></div>
                                                <div class="flex justify-between"><span class="text-gray-500 dark:text-gray-400">Engagement:</span><span class="font-semibold text-green-600">+${Math.floor(Math.random() * 25) + 15}%</span></div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                </div>
                ` : ''}
                
                <!-- Main Content -->
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                    <!-- Category Filter -->
                    <div class="category-filter flex flex-wrap gap-3 mb-8 sticky top-16 z-30 py-4 bg-gradient-to-b from-transparent to-gray-50 dark:to-gray-900">
                        <button onclick="setCategory('all')" class="cat-btn px-6 py-3 rounded-xl font-semibold transition-all ${currentCategory === 'all' ? 'bg-[#0EA5E9] text-white shadow-lg shadow-blue-500/30' : 'bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 border border-gray-200 dark:border-gray-700'}">
                            <i class="fas fa-th-large mr-2"></i>All (${filtered.length})
                        </button>
                        ${categories.map(cat => `
                            <button onclick="setCategory('${cat.id}')" class="cat-btn px-6 py-3 rounded-xl font-semibold transition-all flex items-center space-x-2 ${currentCategory === cat.id ? 'text-white shadow-lg' : 'bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 border border-gray-200 dark:border-gray-700'}" style="${currentCategory === cat.id ? `background-color: ${cat.color}` : ''}">
                                <i class="fas ${cat.icon}"></i>
                                <span>${cat.name}</span>
                                <span class="text-xs opacity-80">(${getCategoryCount(cat.id)})</span>
                            </button>
                        `).join('')}
                    </div>
                    
                    <!-- Articles Grid -->
                    ${filtered.length === 0 ? `
                        <div class="text-center py-20">
                            <i class="fas fa-search text-6xl text-gray-300 dark:text-gray-600 mb-4"></i>
                            <h3 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">No articles found</h3>
                            <p class="text-gray-600 dark:text-gray-400">Try adjusting your search or category filter</p>
                        </div>
                    ` : `
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${currentArticles.map(article => {
                                const cat = categories.find(c => c.id === article.category);
                                const fav = isFavorite(article.id);
                                return `
                                    <div class="article-card bg-white dark:bg-gray-800 rounded-2xl shadow-md card-premium cursor-pointer overflow-hidden border border-gray-100 dark:border-gray-700 fade-in" onclick="window.open('${article.url}', '_blank')">
                                        <div class="p-6">
                                            <div class="flex items-center justify-between mb-4">
                                                <span class="px-3 py-1.5 rounded-xl text-sm font-semibold text-white flex items-center space-x-2" style="background: ${cat.color}">
                                                    <i class="fas ${cat.icon} text-xs"></i>
                                                    <span>${cat.name}</span>
                                                </span>
                                                <div class="flex items-center space-x-2">
                                                    ${article.trending ? '<span class="px-2 py-1 bg-red-50 dark:bg-red-900/30 text-red-500 dark:text-red-400 rounded-lg text-xs font-semibold"><i class="fas fa-fire mr-1"></i>Trending</span>' : ''}
                                                    <button onclick="event.stopPropagation(); toggleFavorite(${article.id})" class="text-gray-400 hover:text-yellow-500 transition-colors">
                                                        <i class="fas ${fav ? 'fa-star text-yellow-500' : 'fa-star'}"></i>
                                                    </button>
                                                </div>
                                            </div>
                                            <h3 class="text-xl font-bold text-gray-900 dark:text-white leading-tight mb-3 line-clamp-2 hover:text-[#0EA5E9] dark:hover:text-[#0EA5E9] transition-colors">
                                                ${article.title}
                                            </h3>
                                            <p class="text-gray-600 dark:text-gray-300 mb-4 leading-relaxed line-clamp-3 text-sm">
                                                ${article.description}
                                            </p>
                                            <div class="flex items-center justify-between text-sm pt-4 border-t border-gray-100 dark:border-gray-700">
                                                <div class="flex items-center space-x-2">
                                                    <i class="fas fa-building text-gray-400 text-xs"></i>
                                                    <span class="font-medium text-gray-700 dark:text-gray-300">${article.author}</span>
                                                </div>
                                                <div class="flex items-center space-x-3">
                                                    <div class="flex items-center space-x-1">
                                                        <i class="fas fa-eye text-gray-400 text-xs"></i>
                                                        <span class="text-gray-500 dark:text-gray-400">${article.views.toLocaleString()}</span>
                                                    </div>
                                                    <div class="flex items-center space-x-1">
                                                        <i class="fas fa-clock text-gray-400 text-xs"></i>
                                                        <span class="text-gray-500 dark:text-gray-400">${article.readTime} min</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        
                        ${totalPages > 1 ? `
                        <div class="flex items-center justify-center space-x-2 mt-12">
                            <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} class="p-2 rounded-xl hover:bg-white dark:hover:bg-gray-800 disabled:opacity-50 transition-all">
                                <i class="fas fa-chevron-left"></i>
                            </button>
                            ${Array.from({ length: Math.min(5, totalPages) }, (_, i) => {
                                let pageNum = currentPage;
                                if (totalPages <= 5) pageNum = i + 1;
                                else if (currentPage <= 3) pageNum = i + 1;
                                else if (currentPage >= totalPages - 2) pageNum = totalPages - 4 + i;
                                else pageNum = currentPage - 2 + i;
                                if (pageNum > totalPages) return '';
                                return `<button onclick="changePage(${pageNum})" class="px-4 py-2 rounded-xl font-medium transition-all ${currentPage === pageNum ? 'bg-[#0EA5E9] text-white shadow-lg' : 'hover:bg-white dark:hover:bg-gray-800'}">${pageNum}</button>`;
                            }).join('')}
                            <button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} class="p-2 rounded-xl hover:bg-white dark:hover:bg-gray-800 disabled:opacity-50 transition-all">
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                        ` : ''}
                    `}
                </div>
                
                <!-- Back to Top Button -->
                <button onclick="window.scrollTo({top:0,behavior:'smooth'})" class="fixed bottom-8 right-8 bg-[#0EA5E9] text-white p-3 rounded-full shadow-lg hover:shadow-xl transition-all z-50">
                    <i class="fas fa-arrow-up"></i>
                </button>
                
                <!-- Premium Footer -->
                <footer class="bg-gray-900 dark:bg-black text-white mt-20">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-8 mb-8">
                            <div>
                                <div class="flex items-center space-x-3 mb-4">
                                    <div class="w-10 h-10 bg-gradient-to-br from-[#0EA5E9] to-[#8B5CF6] rounded-xl flex items-center justify-center">
                                        <i class="fas fa-brain text-white"></i>
                                    </div>
                                    <span class="text-xl font-bold">Intelligence Hub</span>
                                </div>
                                <p class="text-gray-400 text-sm">World-class business intelligence platform. Trusted by global enterprises.</p>
                            </div>
                            <div>
                                <h3 class="font-bold mb-4">Categories</h3>
                                <div class="space-y-2 text-sm text-gray-400">
                                    ${categories.map(cat => `
                                        <button onclick="setCategory('${cat.id}')" class="block hover:text-[#0EA5E9] transition-colors">${cat.name}</button>
                                    `).join('')}
                                </div>
                            </div>
                            <div>
                                <h3 class="font-bold mb-4">Resources</h3>
                                <div class="space-y-2 text-sm text-gray-400">
                                    <a href="#" class="block hover:text-[#0EA5E9] transition-colors">About Us</a>
                                    <a href="#" class="block hover:text-[#0EA5E9] transition-colors">API Access</a>
                                    <a href="#" class="block hover:text-[#0EA5E9] transition-colors">Partnerships</a>
                                </div>
                            </div>
                            <div>
                                <h3 class="font-bold mb-4">Connect</h3>
                                <a href="https://t.me/IliaKolosoff" target="_blank" class="inline-flex items-center space-x-2 px-5 py-3 bg-gradient-to-r from-[#0EA5E9] to-[#8B5CF6] rounded-xl hover:shadow-lg transition-all">
                                    <i class="fab fa-telegram"></i>
                                    <span class="font-medium">Telegram Channel</span>
                                </a>
                            </div>
                        </div>
                        <div class="pt-8 border-t border-gray-800 text-center text-gray-400 text-sm">
                            © 2025 Corporate Intelligence Hub. All rights reserved. Powered by 100+ Premium Sources
                        </div>
                    </div>
                </footer>
            </div>
        `;
        
        document.getElementById('app').innerHTML = html;
        
        // Apply dark mode class to body
        if (isDark) document.body.classList.add('dark');
        else document.body.classList.remove('dark');
        
        // Render chart if analytics visible
        if (showStats) {
            setTimeout(() => renderChart(), 100);
        }
        
        // Initialize scroll animations after DOM update
        setTimeout(() => initScrollAnimations(), 100);
    }
    
    // Global functions
    window.setCategory = (cat) => {
        currentCategory = cat;
        currentPage = 1;
        render();
    };
    
    window.handleSearch = (value) => {
        currentSearch = value;
        currentPage = 1;
        render();
    };
    
    window.changePage = (page) => {
        const filtered = getFilteredArticles();
        const totalPages = Math.ceil(filtered.length / articlesPerPage);
        if (page >= 1 && page <= totalPages) {
            currentPage = page;
            render();
        }
    };
    
    window.toggleStats = () => {
        showStats = !showStats;
        render();
    };
    
    window.toggleMobileMenu = () => {
        const menu = document.getElementById('mobileMenu');
        const icon = document.getElementById('menuIcon');
        if (menu.classList.contains('hidden')) {
            menu.classList.remove('hidden');
            icon.classList.remove('fa-bars');
            icon.classList.add('fa-times');
        } else {
            menu.classList.add('hidden');
            icon.classList.remove('fa-times');
            icon.classList.add('fa-bars');
        }
    };
    
    window.closeMobileMenu = () => {
        const menu = document.getElementById('mobileMenu');
        const icon = document.getElementById('menuIcon');
        menu.classList.add('hidden');
        icon.classList.remove('fa-times');
        icon.classList.add('fa-bars');
    };
    
    window.toggleFavorite = toggleFavorite;
    window.startVoiceSearch = startVoiceSearch;
    window.toggleTheme = toggleTheme;
    
    // Initial render
    render();
</script>
</body>
</html>
